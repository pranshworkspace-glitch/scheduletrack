<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ScheduleTrack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f5;color:#1a1a1a}
:root{--blue:#1a56db;--blue-light:#ebf0ff;--blue-dark:#1e40af;--red:#dc2626;--red-light:#fef2f2;--green:#16a34a;--green-light:#f0fdf4;--amber:#d97706;--border:#e5e7eb;--gray:#6b7280;--radius:8px}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;width:100%;outline:none;background:#fff;color:#1a1a1a}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,0.1)}
button{font-family:inherit;cursor:pointer;border-radius:var(--radius);font-size:13px;font-weight:500;border:none;transition:all 0.15s}
.btn{padding:7px 14px;background:#fff;border:1px solid var(--border);color:#374151}
.btn:hover{background:#f9fafb}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:7px 14px}
.btn-primary:hover{background:var(--blue-dark)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fecaca}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:600;color:var(--gray);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);background:#f9fafb;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.sidebar{width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:10;overflow-y:auto}
.main{margin-left:220px;min-height:100vh}
.content{padding:24px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:#6b7280;cursor:pointer;border-left:3px solid transparent}
.nav-item:hover{background:#f9fafb;color:#1a1a1a}
.nav-item.active{color:var(--blue);background:var(--blue-light);border-left-color:var(--blue);font-weight:500}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.metric{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.metric-label{font-size:11px;color:var(--gray);margin-bottom:6px;font-weight:500}
.metric-value{font-size:26px;font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);padding:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-field label{font-size:12px;font-weight:500;color:#374151}
.form-field textarea{height:72px;resize:vertical}
.section-hdr{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin:16px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--blue-light);color:var(--blue);font-weight:600;font-size:11px;flex-shrink:0}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:13px;z-index:999}
.alert-info{background:#ebf0ff;border:1px solid #c7d2fe;color:#1e40af;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px}
.empty{text-align:center;padding:40px;color:var(--gray)}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ph h1{font-size:18px;font-weight:600}
.ph p{font-size:13px;color:var(--gray);margin-top:2px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filters input,.filters select{width:auto;min-width:140px}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto;display:block}
@keyframes sp{to{transform:rotate(360deg)}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f5}
.login-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:40px;width:380px}
.detail-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.detail-label{font-size:12px;color:var(--gray);width:150px;flex-shrink:0}
.comment-box{background:#f9fafb;border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;padding:12px 16px 4px}
.sidebar-bottom{padding:12px 16px;border-top:1px solid var(--border);margin-top:auto;display:flex;align-items:center;gap:10px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Load dependencies sequentially then boot ──────────────
function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function(){ console.error('Failed to load', src); };
  document.head.appendChild(s);
}

loadScript('https://unpkg.com/react@18/umd/react.production.min.js', function() {
loadScript('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js', function() {
loadScript('https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js', function() {
  boot();
});});});

function boot() {
var R = React;
var h = R.createElement;
var useState = R.useState;
var useEffect = R.useEffect;
var useRef = R.useRef;
var sb = supabase.createClient(
  'https://becoowtveruxxtfkhpmm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlY29vd3R2ZXJ1eHh0ZmtocG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxODY4ODMsImV4cCI6MjA5Nzc2Mjg4M30.36WyQPL369YjntOCTRiPDA2nM40DW8roT8_bkp379xY'
);

// ── helpers ───────────────────────────────────────────────
function ini(n){return (n||'').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'?';}
function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}

var BADGE_COLORS = {
  planned:{background:'#dbeafe',color:'#1e40af'},
  in_progress:{background:'#fef3c7',color:'#92400e'},
  completed:{background:'#d1fae5',color:'#065f46'},
  overdue:{background:'#fee2e2',color:'#991b1b'},
  open:{background:'#fef3c7',color:'#92400e'},
  under_review:{background:'#ede9fe',color:'#5b21b6'},
  closed:{background:'#d1fae5',color:'#065f46'},
  super_admin:{background:'#dbeafe',color:'#1e40af'},
  client_admin:{background:'#ede9fe',color:'#5b21b6'},
  user:{background:'#f3f4f6',color:'#374151'},
  active:{background:'#d1fae5',color:'#065f46'},
  inactive:{background:'#f3f4f6',color:'#6b7280'}
};
var BADGE_LABELS = {planned:'Planned',in_progress:'In Progress',completed:'Completed',overdue:'Overdue',open:'Open',under_review:'Under Review',closed:'Closed',super_admin:'Super Admin',client_admin:'Client Admin',user:'User',active:'Active',inactive:'Inactive'};

function Badge(v) { return h('span',{className:'badge',style:BADGE_COLORS[v]||''},BADGE_LABELS[v]||v); }
function Av(name,size) { size=size||28; return h('div',{className:'avatar',style:{width:size+'px',height:size+'px',fontSize:(size*0.38)+'px'}},ini(name)); }
function Spin() { return h('div',{className:'spin'}); }
function SectionHdr(t) { return h('div',{className:'section-hdr'},t); }

function showToastFn(setT){ return function(msg){ setT(msg); setTimeout(function(){setT('');},3000); }; }

// ── Modal ─────────────────────────────────────────────────
function Modal(props) {
  return h('div',{className:'modal-bg',onClick:function(e){if(e.target===e.currentTarget)props.onClose();}},
    h('div',{className:'modal'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}},
        h('h2',{style:{fontSize:'16px',fontWeight:600}},props.title),
        h('button',{className:'btn btn-sm',onClick:props.onClose},'✕')
      ),
      props.children,
      props.footer && h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end',marginTop:'16px',paddingTop:'14px',borderTop:'1px solid var(--border)'}},props.footer)
    )
  );
}

// ── Login ─────────────────────────────────────────────────
function Login(props) {
  var s = useState({email:'',pass:'',err:'',loading:false});
  var form=s[0], setForm=s[1];
  function set(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});}
  function submit(e){
    e.preventDefault(); set('err',''); set('loading',true);
    sb.auth.signInWithPassword({email:form.email,password:form.pass}).then(function(r){
      if(r.error){set('err',r.error.message);set('loading',false);return;}
      sb.from('profiles').select('*').eq('id',r.data.user.id).single().then(function(p){
        if(!p.data||p.data.status==='inactive'){set('err','Account inactive.');set('loading',false);return;}
        props.onLogin(r.data.user,p.data);
      });
    });
  }
  return h('div',{className:'login-wrap'},
    h('div',{className:'login-card'},
      h('div',{style:{textAlign:'center',marginBottom:'28px'}},
        h('div',{style:{fontSize:'32px',marginBottom:'6px'}},'📋'),
        h('h1',{style:{fontSize:'20px',fontWeight:700}},'ScheduleTrack'),
        h('p',{style:{color:'var(--gray)',fontSize:'13px',marginTop:'4px'}},'Sign in to your account')
      ),
      form.err && h('div',{style:{background:'#fee2e2',border:'1px solid #fecaca',color:'#991b1b',padding:'10px 14px',borderRadius:'var(--radius)',fontSize:'13px',marginBottom:'14px'}},form.err),
      h('form',{onSubmit:submit},
        h('div',{className:'form-field'},h('label',null,'Email'),h('input',{type:'email',value:form.email,onChange:function(e){set('email',e.target.value);},placeholder:'your@email.com',required:true})),
        h('div',{className:'form-field'},h('label',null,'Password'),h('input',{type:'password',value:form.pass,onChange:function(e){set('pass',e.target.value);},placeholder:'••••••••',required:true})),
        h('button',{className:'btn-primary',type:'submit',style:{width:'100%',padding:'10px',marginTop:'4px'},disabled:form.loading},form.loading?'Signing in…':'Sign in')
      )
    )
  );
}

// ── Sidebar ───────────────────────────────────────────────
function Sidebar(props) {
  var role=props.profile.role;
  var nav=[{icon:'📊',label:'Dashboard',page:'dashboard'}];
  if(role==='super_admin'){nav.push({icon:'🏢',label:'Clients',page:'clients'});nav.push({icon:'👥',label:'All Users',page:'users'});}
  if(role==='client_admin'){nav.push({icon:'📍',label:'My Sites',page:'sites'});nav.push({icon:'👥',label:'My Users',page:'users'});}
  nav.push({icon:'📅',label:'Events',page:'events'});
  nav.push({icon:'🔍',label:'Observations',page:'observations'});
  nav.push({icon:'📄',label:'Reports',page:'reports'});
  if(role==='super_admin') nav.push({icon:'🕒',label:'Audit Trail',page:'audit'});
  if(role!=='user') nav.push({icon:'✉️',label:'Email Alerts',page:'alerts'});
  if(role==='super_admin') nav.push({icon:'⚙️',label:'Settings',page:'settings'});

  return h('div',{className:'sidebar'},
    h('div',{style:{padding:'16px',borderBottom:'1px solid var(--border)'}},
      h('div',{style:{fontWeight:700,fontSize:'15px'}},'📋 ScheduleTrack'),
      h('div',{style:{fontSize:'11px',color:'var(--gray)',marginTop:'2px'}},'Event & Observation Manager')
    ),
    h('div',{style:{flex:1,overflowY:'auto',paddingTop:'8px'}},
      h('div',{className:'nav-label'},'Menu'),
      nav.map(function(n){
        return h('div',{key:n.page,className:'nav-item'+(props.page===n.page?' active':''),onClick:function(){props.setPage(n.page);}},
          h('span',{style:{width:'18px',textAlign:'center'}},n.icon),n.label
        );
      })
    ),
    h('div',{className:'sidebar-bottom'},
      Av(props.profile.full_name),
      h('div',{style:{flex:1,minWidth:0}},
        h('div',{style:{fontSize:'12px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},props.profile.full_name),
        h('div',{style:{fontSize:'11px',marginTop:'2px'}},Badge(props.profile.role))
      ),
      h('button',{className:'btn btn-sm',onClick:props.onLogout,title:'Sign out'},'↩')
    )
  );
}

function RecentEvents(props){
  var s=useState([]); var events=s[0],setEvents=s[1];
  useEffect(function(){
    var q=sb.from('events').select('*,sites(site_name),profiles!events_responsible_id_fkey(full_name)').order('proposed_date').limit(8);
    if(props.profile.client_id) q=q.eq('client_id',props.profile.client_id);
    q.then(function(r){setEvents(r.data||[]);});
  },[]);
  return h('div',{className:'card'},
    h('div',{style:{fontWeight:600,marginBottom:'12px'}},'Recent events'),
    events.length===0?h('div',{className:'empty'},'No events yet.'):
    h('div',{style:{overflowX:'auto'}},
      h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Event'),h('th',null,'Site'),h('th',null,'Proposed date'),h('th',null,'Responsible'),h('th',null,'Status'))),
        h('tbody',null,events.map(function(e){
          return h('tr',{key:e.id},
            h('td',{style:{fontWeight:500}},e.event_name),
            h('td',{style:{color:'var(--gray)'}},e.sites&&e.sites.site_name||'—'),
            h('td',null,fmtDate(e.proposed_date)),
            h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},Av(e.profiles&&e.profiles.full_name||'?'),e.profiles&&e.profiles.full_name||'—')),
            h('td',null,Badge(e.status))
          );
        }))
      )
    )
  );
}

// ── Dashboard ─────────────────────────────────────────────
function Dashboard(props) {
  var s=useState(null); var stats=s[0],setStats=s[1];
  useEffect(function(){
    var cid=props.profile.client_id;
    var evQ=sb.from('events').select('id,status,proposed_date,client_id');
    var obsQ=sb.from('observations').select('id,status,event_id');
    if(cid){evQ=evQ.eq('client_id',cid);}
    Promise.all([evQ,obsQ]).then(function(res){
      var evs=res[0].data||[], obs=res[1].data||[];
      var today=new Date(); today.setHours(0,0,0,0);
      var in60=new Date(today); in60.setDate(in60.getDate()+60);
      var upcoming=evs.filter(function(e){return ['planned','in_progress'].includes(e.status)&&new Date(e.proposed_date)>=today&&new Date(e.proposed_date)<=in60;}).length;
      var overdue=evs.filter(function(e){return e.status==='overdue';}).length;
      var completed=evs.filter(function(e){return e.status==='completed';}).length;
      var eids=evs.map(function(e){return e.id;});
      var myObs=cid?obs.filter(function(o){return eids.includes(o.event_id);}):obs;
      var openObs=myObs.filter(function(o){return o.status==='open';}).length;
      var closedObs=myObs.filter(function(o){return o.status==='closed';}).length;
      if(props.profile.role==='super_admin'){
        Promise.all([
          sb.from('clients').select('*',{count:'exact',head:true}),
          sb.from('sites').select('*',{count:'exact',head:true})
        ]).then(function(r){
          setStats({total:evs.length,upcoming:upcoming,overdue:overdue,completed:completed,openObs:openObs,closedObs:closedObs,clients:r[0].count||0,sites:r[1].count||0});
        });
      } else {
        setStats({total:evs.length,upcoming:upcoming,overdue:overdue,completed:completed,openObs:openObs,closedObs:closedObs});
      }
    });
  },[]);

  if(!stats) return Spin();
  var isSA=props.profile.role==='super_admin';
  var metrics=[];
  if(isSA){metrics.push(['Clients',stats.clients,'var(--blue)']);metrics.push(['Sites',stats.sites,'#1a1a1a']);}
  metrics.push(['Total events',stats.total,'#1a1a1a']);
  metrics.push(['Upcoming (60d)',stats.upcoming,'var(--blue)']);
  metrics.push(['Overdue',stats.overdue,'var(--red)']);
  metrics.push(['Completed',stats.completed,'var(--green)']);
  metrics.push(['Open observations',stats.openObs,'var(--amber)']);
  metrics.push(['Closed observations',stats.closedObs,'var(--green)']);

  return h('div',null,
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
      h('h1',{style:{fontSize:'18px',fontWeight:600}},'Dashboard')
    ),
    h('div',{className:'metric-grid'},
      metrics.map(function(m){
        return h('div',{key:m[0],className:'metric'},
          h('div',{className:'metric-label'},m[0]),
          h('div',{className:'metric-value',style:{color:m[2]}},m[1])
        );
      })
    ),
    h(RecentEvents,{profile:props.profile})
  );
}

// ── Clients ───────────────────────────────────────────────
function Clients(props){
  var s=useState([]); var clients=s[0],setClients=s[1];
  var ls=useState(true); var loading=ls[0],setLoading=ls[1];
  var ms=useState(null); var modal=ms[0],setModal=ms[1];
  var fs=useState({company_name:'',max_sites:5,status:'active'}); var form=fs[0],setForm=fs[1];
  function sf(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});}

  useEffect(function(){load();},[]);
  function load(){setLoading(true);sb.from('clients').select('*').order('company_name').then(function(r){setClients(r.data||[]);setLoading(false);});}
  function save(){
    if(!form.company_name.trim()){props.toast('Company name required');return;}
    var p={company_name:form.company_name,max_sites:Number(form.max_sites),status:form.status};
    var q=modal==='add'?sb.from('clients').insert(p):sb.from('clients').update(p).eq('id',modal.id);
    q.then(function(r){if(r.error){props.toast('Error: '+r.error.message);return;}props.toast(modal==='add'?'Client created':'Client updated');setModal(null);load();});
  }

  return h('div',null,
    h('div',{className:'ph'},h('div',null,h('h1',null,'Clients'),h('p',null,'Manage client accounts')),h('button',{className:'btn-primary btn',onClick:function(){setForm({company_name:'',max_sites:5,status:'active'});setModal('add');}},'+  Add client')),
    loading?Spin():h('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Company'),h('th',null,'Max sites'),h('th',null,'Status'),h('th',null,''))),
        h('tbody',null,clients.length===0?h('tr',null,h('td',{colSpan:4},h('div',{className:'empty'},'No clients yet.'))):
          clients.map(function(c){return h('tr',{key:c.id},h('td',{style:{fontWeight:500}},c.company_name),h('td',null,c.max_sites),h('td',null,Badge(c.status)),h('td',null,h('button',{className:'btn btn-sm',onClick:function(){setForm({company_name:c.company_name,max_sites:c.max_sites,status:c.status});setModal(c);}},'Edit')));})
        )
      )
    ),
    modal&&h(Modal,{title:modal==='add'?'Add client':'Edit client',onClose:function(){setModal(null);},footer:[h('button',{key:'c',className:'btn',onClick:function(){setModal(null);}},'Cancel'),h('button',{key:'s',className:'btn-primary btn',onClick:save},'Save')]},
      h('div',{className:'form-field'},h('label',null,'Company name'),h('input',{value:form.company_name,onChange:function(e){sf('company_name',e.target.value);},placeholder:'Company name'})),
      h('div',{className:'form-row'},
        h('div',{className:'form-field'},h('label',null,'Max sites'),h('input',{type:'number',min:1,value:form.max_sites,onChange:function(e){sf('max_sites',e.target.value);}})),
        h('div',{className:'form-field'},h('label',null,'Status'),h('select',{value:form.status,onChange:function(e){sf('status',e.target.value);}},h('option',{value:'active'},'Active'),h('option',{value:'inactive'},'Inactive')))
      )
    )
  );
}

// ── Sites ─────────────────────────────────────────────────
function Sites(props){
  var s=useState([]); var sites=s[0],setSites=s[1];
  var cs=useState(null); var client=cs[0],setClient=cs[1];
  var ms=useState(null); var modal=ms[0],setModal=ms[1];
  var fs=useState({site_name:''}); var form=fs[0],setForm=fs[1];
  var ls=useState(true); var loading=ls[0],setLoading=ls[1];

  useEffect(function(){load();},[]);
  function load(){
    setLoading(true);
    Promise.all([
      sb.from('sites').select('*').eq('client_id',props.profile.client_id).order('site_name'),
      sb.from('clients').select('*').eq('id',props.profile.client_id).single()
    ]).then(function(r){setSites(r[0].data||[]);setClient(r[1].data);setLoading(false);});
  }
  function save(){
    if(!form.site_name.trim()){props.toast('Site name required');return;}
    if(modal==='add'&&client&&sites.length>=client.max_sites){props.toast('Site limit reached');return;}
    var q=modal==='add'?sb.from('sites').insert({site_name:form.site_name,client_id:props.profile.client_id}):sb.from('sites').update({site_name:form.site_name}).eq('id',modal.id);
    q.then(function(r){if(r.error){props.toast('Error: '+r.error.message);return;}props.toast(modal==='add'?'Site created':'Site updated');setModal(null);load();});
  }

    h('div',{className:'ph'},h('div',null,h('h1',null,'Observations'),h('p',null,'Track and close all observations'))),
    h('div',{className:'filters'},
      h('select',{value:filter,onChange:function(e){setFilter(e.target.value);}},h('option',{value:''},'All statuses'),h('option',{value:'open'},'Open'),h('option',{value:'under_review'},'Under Review'),h('option',{value:'closed'},'Closed'))
    ),
    loading?Spin():h('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      h('div',{style:{overflowX:'auto'}},h('table',null,
        h('thead',null,h('tr',null,h('th',null,'Event'),h('th',null,'Site'),h('th',null,'Description'),h('th',null,'Status'),h('th',null,'Closure date'))),
        h('tbody',null,filtered.length===0?h('tr',null,h('td',{colSpan:5},h('div',{className:'empty'},'No observations found.'))):
          filtered.map(function(o){return h('tr',{key:o.id},
            h('td',{style:{fontWeight:500}},o.events&&o.events.event_name||'—'),
            h('td',{style:{color:'var(--gray)'}},o.events&&o.events.sites&&o.events.sites.site_name||'—'),
            h('td',{style:{maxWidth:'220px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},o.description),
            h('td',null,Badge(o.status)),
            h('td',null,o.closure_date?fmtDate(o.closure_date):h('span',{style:{color:'var(--gray)'}},'Pending'))
          );})
        )
      ))
    )
  );
}

// ── Reports ───────────────────────────────────────────────
function Reports(props){
  var reports=[
    {title:'Event Schedule Report',desc:'All events with status and dates'},
    {title:'Upcoming Events Report',desc:'Events due within the next 60 days'},
    {title:'Overdue Events Report',desc:'Events past proposed date with no completion'},
    {title:'Open Observations Report',desc:'All observations without a closure date'},
    {title:'Observation Closure Report',desc:'Closed observations with remarks'},
    {title:'Site-wise Report',desc:'Event and observation summary per site'},
    {title:'Monthly Summary Report',desc:'Monthly completion and overdue trends'},
  ];
  function exportCSV(title){
    var cid=props.profile.client_id;
    var q;
    if(title==='Upcoming Events Report'){
      var today=new Date().toISOString().slice(0,10);
      var in60=new Date(Date.now()+60*86400000).toISOString().slice(0,10);
      q=sb.from('events').select('event_name,proposed_date,status,sites(site_name),profiles!events_responsible_id_fkey(full_name)').gte('proposed_date',today).lte('proposed_date',in60).in('status',['planned','in_progress']);
    } else if(title==='Overdue Events Report'){
      q=sb.from('events').select('event_name,proposed_date,status,sites(site_name),profiles!events_responsible_id_fkey(full_name)').eq('status','overdue');
    } else if(title==='Open Observations Report'){
      q=sb.from('observations').select('description,status,events(event_name,sites(site_name))').eq('status','open');
    } else {
      q=sb.from('events').select('event_name,proposed_date,completion_date,status,sites(site_name),profiles!events_responsible_id_fkey(full_name)');
    }
    if(cid&&title!=='Open Observations Report') q=q.eq('client_id',cid);
    q.then(function(r){
      var data=r.data||[];
      if(!data.length){props.toast('No data to export');return;}
      var rows,headers;
      if(title==='Open Observations Report'){
        headers=['Description','Status','Event','Site'];
        rows=data.map(function(o){return [o.description,o.status,o.events&&o.events.event_name||'',o.events&&o.events.sites&&o.events.sites.site_name||''];});
      } else {
        headers=['Event','Site','Proposed Date','Completion Date','Status','Responsible'];
        rows=data.map(function(e){return [e.event_name,e.sites&&e.sites.site_name||'',e.proposed_date||'',e.completion_date||'',e.status,e.profiles&&e.profiles.full_name||''];});
      }
      var csv=[headers,...rows].map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
      var blob=new Blob([csv],{type:'text/csv'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download=title.replace(/ /g,'_')+'.csv';a.click();
      props.toast('CSV downloaded');
    });
  }
  return h('div',null,
    h('div',{className:'ph'},h('div',null,h('h1',null,'Reports'),h('p',null,'Export and download'))),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'16px'}},
      reports.map(function(r){return h('div',{key:r.title,className:'card'},
        h('div',{style:{fontWeight:600,marginBottom:'4px'}},r.title),
        h('div',{style:{fontSize:'12px',color:'var(--gray)',marginBottom:'14px'}},r.desc),
        h('button',{className:'btn btn-sm',onClick:function(){exportCSV(r.title);}},'\u2B07 Export CSV')
      );})
    )
  );
}

          );})

}

// ── Alerts ────────────────────────────────────────────────
function Alerts(props){
  var s=useState(null); var settings=s[0],setSettings=s[1];
  var ls=useState(true); var loading=ls[0],setLoading=ls[1];
  function sf(k,v){setSettings(function(f){var n=Object.assign({},f);n[k]=v;return n;});}
  useEffect(function(){
    var cid=props.profile.client_id;
    if(!cid){setLoading(false);return;}
    sb.from('alert_settings').select('*').eq('client_id',cid).single().then(function(r){
      setSettings(r.data||{client_id:cid,send_day:'Monday',send_time:'08:00',include_upcoming:true,include_overdue:true,include_open_obs:true,notify_admin:true,notify_users:true,extra_emails:[]});
      setLoading(false);
    });
  },[]);
  function save(){
    sb.from('alert_settings').upsert(settings,{onConflict:'client_id'}).then(function(r){
      if(r.error){props.toast('Error: '+r.error.message);return;}
      props.toast('Alert settings saved');
    });
  }
  if(loading)return Spin();
  if(!settings)return h('div',{className:'alert-info'},'Email alerts are configured per client.');
  var days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  return h('div',null,
    h('div',{className:'ph'},h('div',null,h('h1',null,'Email alerts'),h('p',null,'Weekly notification schedule'))),
    h('div',{className:'card',style:{marginBottom:'16px'}},
      h('div',{style:{fontWeight:600,marginBottom:'12px'}},'Schedule'),
      h('div',{className:'form-row'},
        h('div',{className:'form-field'},h('label',null,'Send day'),h('select',{value:settings.send_day,onChange:function(e){sf('send_day',e.target.value);}},days.map(function(d){return h('option',{key:d},d);}))),
        h('div',{className:'form-field'},h('label',null,'Send time'),h('input',{type:'time',value:settings.send_time,onChange:function(e){sf('send_time',e.target.value);}}))
      )
    ),
    h('div',{className:'card',style:{marginBottom:'16px'}},
      h('div',{style:{fontWeight:600,marginBottom:'12px'}},'Alert content'),
      [['include_upcoming','Upcoming events','Events due within 60 days'],['include_overdue','Overdue events','Past due date'],['include_open_obs','Open observations','Without closure date']].map(function(item){
        return h('label',{key:item[0],style:{display:'flex',alignItems:'center',gap:'12px',padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}},
          h('input',{type:'checkbox',checked:!!settings[item[0]],onChange:function(e){sf(item[0],e.target.checked);},style:{width:'auto'}}),
          h('div',null,h('div',{style:{fontWeight:500}},item[1]),h('div',{style:{fontSize:'12px',color:'var(--gray)'}},item[2]))
        );
      })
    ),
    h('div',{className:'card',style:{marginBottom:'16px'}},
      h('div',{style:{fontWeight:600,marginBottom:'12px'}},'Recipients'),
      [['notify_admin','Always notify client admin'],['notify_users','Notify assigned users']].map(function(item){
        return h('label',{key:item[0],style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px',cursor:'pointer'}},
          h('input',{type:'checkbox',checked:!!settings[item[0]],onChange:function(e){sf(item[0],e.target.checked);},style:{width:'auto'}}),item[1]
        );
      }),
      h('div',{className:'form-field'},h('label',null,'Additional emails (comma-separated)'),h('input',{value:(settings.extra_emails||[]).join(', '),onChange:function(e){sf('extra_emails',e.target.value.split(',').map(function(x){return x.trim();}).filter(Boolean));},placeholder:'ops@company.com, hse@company.com'}))
    ),
    h('button',{className:'btn-primary btn',onClick:save},'Save settings')
  );
}

// ── App ───────────────────────────────────────────────────
function App(){
  var us=useState(null); var user=us[0],setUser=us[1];
  var ps=useState(null); var profile=ps[0],setProfile=ps[1];
  var pgs=useState('dashboard'); var page=pgs[0],setPage=pgs[1];
  var ts=useState(''); var toast=ts[0],setToast=ts[1];
  var bs=useState(true); var booting=bs[0],setBooting=bs[1];
  function showToast(msg){setToast(msg);setTimeout(function(){setToast('');},3000);}

  useEffect(function(){
    sb.auth.getSession().then(function(r){
      var session=r.data.session;
      if(session){
        sb.from('profiles').select('*').eq('id',session.user.id).single().then(function(p){
          if(p.data){setUser(session.user);setProfile(p.data);}
          setBooting(false);
        });
      } else setBooting(false);
    });
    var sub=sb.auth.onAuthStateChange(function(_,session){if(!session){setUser(null);setProfile(null);}});
    return function(){sub.data.subscription.unsubscribe();};
  },[]);

  function handleLogout(){sb.auth.signOut().then(function(){setUser(null);setProfile(null);setPage('dashboard');});}

  if(booting) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}},Spin());
  if(!user||!profile) return h(Login,{onLogin:function(u,p){setUser(u);setProfile(p);}});

  function renderPage(){
    if(page==='dashboard') return h(Dashboard,{profile:profile});
    if(page==='clients') return h(Clients,{profile:profile,toast:showToast});
    if(page==='sites') return h(Sites,{profile:profile,toast:showToast});
    if(page==='users') return h(Users,{profile:profile,toast:showToast});
    if(page==='events') return h(Events,{profile:profile,toast:showToast});
    if(page==='observations') return h(Observations,{profile:profile,toast:showToast});
    if(page==='reports') return h(Reports,{profile:profile,toast:showToast});
    if(page==='audit') return h(Audit,{profile:profile,toast:showToast});
    if(page==='alerts') return h(Alerts,{profile:profile,toast:showToast});
    if(page==='settings') return h(Settings,{profile:profile,toast:showToast});
    return h(Dashboard,{profile:profile});
  }

  return h('div',{style:{display:'flex'}},
    h(Sidebar,{profile:profile,page:page,setPage:setPage,onLogout:handleLogout}),
    h('div',{className:'main'},h('div',{className:'content'},renderPage())),
    toast&&h('div',{className:'toast'},toast)
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App,null));
} // end boot
</script>
